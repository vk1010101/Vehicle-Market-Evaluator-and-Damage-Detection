<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    body {
      background: #f2bc65 url("/static/dhofar_building.jpg") center center / cover no-repeat;
      background-blend-mode: lighten;
      font-family: Inter, Arial, sans-serif;
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Background image veil */
    body::before {
      content: "";
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background: url("/static/dhofar_building.jpg") center center / cover no-repeat;
      opacity: 0.15;
      z-index: -1;
    }

    .main-container {
      display: flex;
      width: 1100px;
      height: 560px;
      background: transparent;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
      border-radius: 15px;
      overflow: hidden;
    }

    .left-half {
      position: relative;
      width: 55%;
      background: linear-gradient(
        135deg,
        rgba(232,145,24,0.82),
        rgba(198,123,18,0.82)
      );
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #fff;
      text-align: center;
      -webkit-backdrop-filter: saturate(120%) blur(0.5px);
      backdrop-filter: saturate(120%) blur(0.5px);
    }

    .logo {
      width: 180px;
      height: auto;
      margin-bottom: 18px;
    }

    .left-title {
      font-size: clamp(20px, 2.2vw, 28px);
      font-weight: 700;
      line-height: 1.3;
      text-shadow: 0 1px 2px rgba(0,0,0,0.15);
      max-width: 85%;
      margin: 4px auto 6px;
    }
    .left-subtitle {
      font-size: clamp(16px, 1.6vw, 22px);
      font-weight: 700;
      line-height: 1.35;
      text-shadow: 0 1px 2px rgba(0,0,0,0.15);
      max-width: 85%;
      margin: 0 auto;
    }

    .right-half {
      width: 45%;
      padding: 36px 30px;
      background: #fff;
    }

    h2 {
      color: #622B47;
      font-size: 1.7em;
      font-weight: 700;
      margin-bottom: 22px;
    }

    .error {
      color: #b12;
      margin-bottom: 14px;
      font-weight: 600;
    }

    .login-btn {
      background: #119C8F;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1.09em;
      font-weight: 700;
      padding: 10px 36px;
      margin-top: 8px;
      cursor: pointer;
      width: 100%;
      transition: background 0.3s ease;
    }
    .login-btn:hover { background: #0e887c; }

    .label {
      margin-bottom: 6px;
      display: block;
      font-weight: 600;
      color: #622B47;
    }

    input[type=text],
    input[type=password] {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      margin-bottom: 16px;
      font-size: 1em;
      background: #fffbe6;
      transition: box-shadow .16s, border-color .16s;
    }
    input[type=text]:focus,
    input[type=password]:focus {
      border-color: #119C8F;
      box-shadow: 0 0 0 3px rgba(17,156,143,0.15);
      outline: none;
    }
  </style>
</head>
<body>
  <div class="main-container">
    <div class="left-half">
      <img src="/static/dhofar-insurance-logo.png" alt="Dhofar Insurance Logo" class="logo">
      <div class="left-title">Vehicle Quotation &amp; Damage Detection Module</div>
      <div class="left-subtitle" dir="rtl">وحدة تسعير المركبات وكشف الأضرار</div>
    </div>

    <div class="right-half">
      <h2>Admin Login</h2>
      {% if error %}
        <div class="error">{{ error }}</div>
      {% endif %}
      <form method="POST" autocomplete="off">
        <label class="label" for="username">Username:</label>
        <input type="text" name="username" id="username" required>

        <label class="label" for="password">Password:</label>
        <input type="password" name="password" id="password" required>

        <button type="submit" class="login-btn">Login</button>
      </form>
    </div>
  </div>
</body>
</html>
